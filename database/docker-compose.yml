services:
  javr-domain-db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./migrations:/docker-entrypoint-initdb.d
      - javr-postgres-data:/var/lib/postgresql/18/docker
    ports:
      - "5432:5432"

volumes:
  javr-postgres-data: