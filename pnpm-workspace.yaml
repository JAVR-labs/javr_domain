packages:
  - 'shared'
  - 'server_manager'
  - 'website'

allowBuilds:
  '@parcel/watcher': true
  '@serialport/bindings-cpp': true
  'sharp': true
  'unrs-resolver': true
  'usb': true

minimumReleaseAgeExclude:
  - fast-xml-parser@5.3.4 || 5.3.5 || 5.3.6 || 5.3.8 || 5.5.6 || 5.5.7 || 5.7.0
  - postcss@8.5.10
  - ws@8.20.1 || 8.21.0
  - qs@6.15.2
  - brace-expansion@1.1.16 || 5.0.6 || 5.0.7
  - form-data@4.0.6
  - js-yaml@4.1.2 || 4.3.0
  - '@babel/core@7.29.1'
  - axios@1.18.0
  - body-parser@1.20.6
  - immutable@5.1.8
  - sharp@0.35.0

overrides:
  fast-xml-parser: ">=5.7.1"
  ws: ">=8.21.0"
  brace-expansion: ">=5.0.7"
  postcss: ">=8.5.12"
  sharp: ">=0.35.0"
